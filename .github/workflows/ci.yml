name: CI - webapi

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: biblio_ci
          POSTGRES_USER: biblio
          POSTGRES_PASSWORD: biblio
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U biblio -d biblio_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      DATABASE_URL: postgres://biblio:biblio@127.0.0.1:5432/biblio_ci?sslmode=disable
      SECRET_KEY: dummy-secret-key
      DEBUG: "False"
      PYTHONWARNINGS: ignore

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Django check
        run: |
          python manage.py check --fail-level=ERROR

      - name: Django migrate
        run: |
          python manage.py migrate --noinput

      - name: Django tests
        run: |
          if find . -type f \( -name "tests.py" -o -path "*/tests/*" \) | grep -q .; then
            python manage.py test
          else
            echo "Sem testes encontrados, ok."
          fi
